name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            package-script: dist:linux
            artifact-name: gofer-flow-linux
            artifact-glob: |
              frontend/release/*.AppImage
              frontend/release/*.deb
              frontend/release/*.rpm
              frontend/release/gof-linux-x64
              frontend/release/checksums-linux.txt
          - name: windows
            os: windows-latest
            package-script: dist:win
            artifact-name: gofer-flow-windows
            artifact-glob: |
              frontend/release/*.exe
              frontend/release/checksums-windows.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --extra dev --group dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Electron packages
        working-directory: frontend
        run: npm run ${{ matrix.package-script }}

      - name: Copy Linux CLI artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cp dist/gof frontend/release/gof-linux-x64
          chmod +x frontend/release/gof-linux-x64

      - name: Build Linux CLI packages
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/package-cli-linux.sh dist/gof frontend/release

      - name: Copy Windows CLI artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item dist/gof.exe frontend/release/gof-windows-x64.exe

      - name: Generate Linux checksums
        if: runner.os == 'Linux'
        working-directory: frontend/release
        shell: bash
        run: |
          sha256sum *.AppImage *.deb *.rpm gof-linux-x64 > checksums-linux.txt
          cat checksums-linux.txt

      - name: Generate Windows checksums
        if: runner.os == 'Windows'
        working-directory: frontend/release
        shell: pwsh
        run: |
          Get-ChildItem -File -Filter "*.exe" |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 $_.FullName
              "$($hash.Hash.ToLower())  $($_.Name)"
            } | Set-Content checksums-windows.txt
          Get-Content checksums-windows.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

      - name: Upload GitHub release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-glob }}
