name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            package-script: dist:linux
            artifact-name: gofer-flow-linux
            artifact-glob: |
              frontend/release/*.AppImage
              frontend/release/*.AppImage.blockmap
              frontend/release/*.deb
              frontend/release/*.rpm
              frontend/release/latest-linux.yml
              frontend/release/gof-linux-x64
              frontend/release/checksums-linux.txt
          - name: windows
            os: windows-latest
            package-script: dist:win
            artifact-name: gofer-flow-windows
            artifact-glob: |
              frontend/release/*.exe
              frontend/release/*.exe.blockmap
              frontend/release/latest.yml
              frontend/release/checksums-windows.txt
          - name: macos
            os: macos-latest
            package-script: dist:mac
            artifact-name: gofer-flow-macos
            artifact-glob: |
              frontend/release/*.dmg
              frontend/release/*.dmg.blockmap
              frontend/release/*.zip
              frontend/release/*.zip.blockmap
              frontend/release/latest-mac.yml
              frontend/release/gof-macos-*
              frontend/release/checksums-macos.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm xvfb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --extra dev --extra xlsx --group dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Browser-test workflow studio
        if: runner.os == 'Linux'
        working-directory: frontend
        run: xvfb-run -a npm run test:browser

      - name: Build Electron packages
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.package-script }} -- --publish never

      - name: Copy Linux CLI artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cp dist/gof frontend/release/gof-linux-x64
          chmod +x frontend/release/gof-linux-x64

      - name: Build Linux CLI packages
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/package-cli-linux.sh dist/gof frontend/release

      - name: Copy Windows CLI artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item dist/gof.exe frontend/release/gof-windows-x64.exe

      - name: Copy macOS CLI artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          arch="$(uname -m)"
          case "$arch" in
            arm64) artifact_arch="arm64" ;;
            x86_64) artifact_arch="x64" ;;
            *) artifact_arch="$arch" ;;
          esac
          cp dist/gof "frontend/release/gof-macos-${artifact_arch}"
          chmod +x "frontend/release/gof-macos-${artifact_arch}"

      - name: Generate Linux checksums
        if: runner.os == 'Linux'
        working-directory: frontend/release
        shell: bash
        run: |
          files=()
          for pattern in *.AppImage *.AppImage.blockmap *.deb *.rpm latest-linux.yml gof-linux-x64; do
            for file in $pattern; do
              [ -e "$file" ] && files+=("$file")
            done
          done
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Linux release files found for checksums" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > checksums-linux.txt
          cat checksums-linux.txt

      - name: Generate Windows checksums
        if: runner.os == 'Windows'
        working-directory: frontend/release
        shell: pwsh
        run: |
          Get-ChildItem -File |
            Where-Object { $_.Name -like "*.exe" -or $_.Name -like "*.exe.blockmap" -or $_.Name -eq "latest.yml" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 $_.FullName
              "$($hash.Hash.ToLower())  $($_.Name)"
            } | Set-Content checksums-windows.txt
          Get-Content checksums-windows.txt

      - name: Generate macOS checksums
        if: runner.os == 'macOS'
        working-directory: frontend/release
        shell: bash
        run: |
          files=()
          for pattern in *.dmg *.dmg.blockmap *.zip *.zip.blockmap latest-mac.yml gof-macos-*; do
            for file in $pattern; do
              [ -e "$file" ] && files+=("$file")
            done
          done
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No macOS release files found for checksums" >&2
            exit 1
          fi
          shasum -a 256 "${files[@]}" > checksums-macos.txt
          cat checksums-macos.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

      - name: Upload GitHub release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-glob }}
