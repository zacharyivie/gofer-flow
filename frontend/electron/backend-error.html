<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gofer Flow Backend Error</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #1f1f1f;
        color: #d4d4d4;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 560px;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        color: #f2f2f2;
        font-size: 24px;
      }

      p {
        margin: 0 0 18px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin: 18px 0;
      }

      button {
        border: 1px solid #3c3c3c;
        border-radius: 6px;
        background: #2d2d30;
        color: #f2f2f2;
        cursor: pointer;
        font: inherit;
        padding: 9px 13px;
      }

      button:hover {
        background: #383838;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        padding: 16px;
        background: #252526;
        border: 1px solid #3c3c3c;
        color: #f48771;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Gofer backend did not start</h1>
      <p>Electron could not keep the local Gofer Flow backend running. Restart it, or open the logs folder for troubleshooting details.</p>
      <div class="actions">
        <button id="restart" type="button">Restart backend</button>
        <button id="logs" type="button">Open logs</button>
      </div>
      <pre id="message"></pre>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById("title").textContent =
        params.get("title") || "Gofer backend did not start";
      document.getElementById("message").textContent = params.get("message") || "";
      document.getElementById("restart").addEventListener("click", () => {
        window.goferBackend.restart();
      });
      document.getElementById("logs").addEventListener("click", () => {
        window.goferBackend.openLogs();
      });
    </script>
  </body>
</html>
